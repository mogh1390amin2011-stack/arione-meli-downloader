name: Auto Download

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: "Direct file URL"
        required: true
        type: string
      output_name:
        description: "Optional output file name"
        required: false
        type: string
      split_enabled:
        description: "Enable split ZIP for files larger than 100MB"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write
  actions: read

concurrency:
  group: auto-download-${{ github.ref }}
  cancel-in-progress: false

jobs:
  download:
    runs-on: ubuntu-latest

    env:
      DOWNLOAD_DIR: download-temp
      MAX_DIRECT_BYTES: 104857600
      ZIP_PART_SIZE: 90m
      INPUT_URL: ${{ inputs.file_url }}
      INPUT_OUTPUT_NAME: ${{ inputs.output_name }}
      SPLIT_ENABLED: ${{ inputs.split_enabled }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install aria2 and zip
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip

      - name: Prepare download directory and cleanup old files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$DOWNLOAD_DIR"
          find "$DOWNLOAD_DIR" -type f -mtime +2 -delete

      - name: Resolve filename
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          RAW_NAME="${INPUT_OUTPUT_NAME:-}"

          if [ -z "$RAW_NAME" ]; then
            URL_PATH="${INPUT_URL%%\?*}"
            RAW_NAME="$(basename "$URL_PATH")"
          fi

          if [ -z "$RAW_NAME" ] || [ "$RAW_NAME" = "/" ] || [ "$RAW_NAME" = "." ]; then
            RAW_NAME="downloaded-file"
          fi

          SAFE_NAME="$(echo "$RAW_NAME" | tr -cd '[:alnum:]._-' | sed 's/^[.]*//')"

          if [ -z "$SAFE_NAME" ]; then
            SAFE_NAME="downloaded-file"
          fi

          TS="$(date +%Y%m%d-%H%M%S)"
          BASE="${SAFE_NAME%.*}"
          EXT="${SAFE_NAME##*.}"

          if [ "$BASE" = "$EXT" ]; then
            FINAL_NAME="${BASE}-${TS}"
          else
            FINAL_NAME="${BASE}-${TS}.${EXT}"
          fi

          ZIP_NAME="${FINAL_NAME}.zip"

          echo "safe_name=$FINAL_NAME" >> "$GITHUB_OUTPUT"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Download file with aria2
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p work

          aria2c \
            --continue=true \
            --max-connection-per-server=16 \
            --split=16 \
            --min-split-size=1M \
            --allow-overwrite=true \
            --auto-file-renaming=false \
            --dir=work \
            --out="${{ steps.meta.outputs.safe_name }}" \
            "$INPUT_URL"

      - name: Process downloaded file
        id: process
        shell: bash
        run: |
          set -euo pipefail

          FILE="work/${{ steps.meta.outputs.safe_name }}"
          FINAL_NAME="${{ steps.meta.outputs.safe_name }}"
          ZIP_NAME="${{ steps.meta.outputs.zip_name }}"

          if [ ! -f "$FILE" ]; then
            echo "Downloaded file not found"
            exit 1
          fi

          SIZE="$(stat -c%s "$FILE")"
          echo "Downloaded size: $SIZE bytes"

          if [ "$SIZE" -le "$MAX_DIRECT_BYTES" ]; then
            mv "$FILE" "$DOWNLOAD_DIR/$FINAL_NAME"

            cat > "$DOWNLOAD_DIR/${FINAL_NAME}.info.json" <<EOF
          {
            "name": "$FINAL_NAME",
            "type": "direct",
            "size": $SIZE,
            "createdAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "download": "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_REF_NAME}/$DOWNLOAD_DIR/$FINAL_NAME"
          }
          EOF

            echo "mode=direct" >> "$GITHUB_OUTPUT"
            echo "final_file=$FINAL_NAME" >> "$GITHUB_OUTPUT"
            echo "zip_file=" >> "$GITHUB_OUTPUT"
          else
            if [ "$SPLIT_ENABLED" != "true" ]; then
              echo "File is larger than 100MB and split ZIP is disabled."
              exit 1
            fi

            mkdir -p zipwork
            mv "$FILE" "zipwork/$FINAL_NAME"

            cd zipwork

            zip -0 -s "$ZIP_PART_SIZE" "../$DOWNLOAD_DIR/$ZIP_NAME" "$FINAL_NAME"

            cd ..

            rm -rf zipwork

            ZIP_TOTAL_PARTS="$(find "$DOWNLOAD_DIR" -maxdepth 1 -type f $ -name "${ZIP_NAME}" -o -name "${ZIP_NAME%.*}.z[0-9][0-9]" -o -name "${ZIP_NAME}.z[0-9][0-9]" $ | wc -l | tr -d ' ')"

            cat > "$DOWNLOAD_DIR/${ZIP_NAME}.manifest.json" <<EOF
          {
            "name": "$ZIP_NAME",
            "originalName": "$FINAL_NAME",
            "type": "split-zip",
            "partSize": "$ZIP_PART_SIZE",
            "partCount": $ZIP_TOTAL_PARTS,
            "originalSize": $SIZE,
            "createdAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "usage": "Download all .z01/.z02/... parts and the .zip file into the same folder, then open the .zip file with WinRAR or 7-Zip.",
            "mainZip": "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_REF_NAME}/$DOWNLOAD_DIR/$ZIP_NAME"
          }
          EOF

            echo "mode=splitzip" >> "$GITHUB_OUTPUT"
            echo "final_file=${ZIP_NAME}.manifest.json" >> "$GITHUB_OUTPUT"
            echo "zip_file=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate no file exceeds GitHub 100MB limit
        shell: bash
        run: |
          set -euo pipefail

          TOO_BIG=0

          while IFS= read -r -d '' f; do
            SIZE="$(stat -c%s "$f")"
            if [ "$SIZE" -gt "$MAX_DIRECT_BYTES" ]; then
              echo "ERROR: File exceeds GitHub 100MB limit: $f ($SIZE bytes)"
              TOO_BIG=1
            fi
          done < <(find "$DOWNLOAD_DIR" -type f -print0)

          if [ "$TOO_BIG" = "1" ]; then
            exit 1
          fi

      - name: Commit direct file
        if: steps.process.outputs.mode == 'direct'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$DOWNLOAD_DIR/"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Download: ${{ steps.process.outputs.final_file }}"

          for i in 1 2 3; do
            if git push; then
              exit 0
            fi

            git pull --rebase origin "${GITHUB_REF_NAME}"
            sleep $((i * 3))
          done

          echo "Push failed after 3 retries."
          exit 1

      - name: Commit split ZIP files in safe batches
        if: steps.process.outputs.mode == 'splitzip'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          ZIP_NAME="${{ steps.process.outputs.zip_file }}"

          mapfile -t FILES < <(
            find "$DOWNLOAD_DIR" -maxdepth 1 -type f \
              $ -name "${ZIP_NAME}.manifest.json" -o -name "${ZIP_NAME}" -o -name "${ZIP_NAME%.*}.z[0-9][0-9]" -o -name "${ZIP_NAME}.z[0-9][0-9]" $ \
              | sort
          )

          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No split ZIP files found."
            exit 1
          fi

          BATCH=0

          for FILE in "${FILES[@]}"; do
            SIZE="$(stat -c%s "$FILE")"

            if [ "$SIZE" -gt "$MAX_DIRECT_BYTES" ]; then
              echo "ERROR: File exceeds 100MB: $FILE"
              exit 1
            fi

            BATCH=$((BATCH + 1))

            git add "$FILE"

            if git diff --cached --quiet; then
              echo "No staged change for $FILE"
              continue
            fi

            git commit -m "Download split ZIP part $BATCH: $ZIP_NAME"

            for i in 1 2 3; do
              if git push; then
                break
              fi

              git pull --rebase origin "${GITHUB_REF_NAME}"
              sleep $((i * 3))

              if [ "$i" = "3" ]; then
                echo "Push failed after 3 retries."
                exit 1
              fi
            done
          done

      - name: Print final raw URL
        shell: bash
        run: |
          set -euo pipefail

          REPO="${GITHUB_REPOSITORY}"
          BRANCH="${GITHUB_REF_NAME}"

          echo ""
          echo "Download folder:"
          echo "https://github.com/${REPO}/tree/${BRANCH}/download-temp"
          echo ""

          if [ "${{ steps.process.outputs.mode }}" = "direct" ]; then
            echo "Final direct file:"
            echo "https://raw.githubusercontent.com/${REPO}/${BRANCH}/download-temp/${{ steps.process.outputs.final_file }}"
          else
            ZIP_NAME="${{ steps.process.outputs.zip_file }}"

            echo "Split ZIP created."
            echo ""
            echo "Main ZIP file:"
            echo "https://raw.githubusercontent.com/${REPO}/${BRANCH}/download-temp/${ZIP_NAME}"
            echo ""
            echo "Manifest:"
            echo "https://raw.githubusercontent.com/${REPO}/${BRANCH}/download-temp/${ZIP_NAME}.manifest.json"
            echo ""
            echo "All required parts:"
            find "$DOWNLOAD_DIR" -maxdepth 1 -type f \
              $ -name "${ZIP_NAME}" -o -name "${ZIP_NAME%.*}.z[0-9][0-9]" -o -name "${ZIP_NAME}.z[0-9][0-9]" $ \
              | sort \
              | while read -r f; do
                  b="$(basename "$f")"
                  echo "https://raw.githubusercontent.com/${REPO}/${BRANCH}/download-temp/${b}"
                done

            echo ""
            echo "Usage:"
            echo "Download all .z01/.z02/... files and the .zip file into one folder, then open the .zip file with WinRAR or 7-Zip."
          fi
